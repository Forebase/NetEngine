# CoreDNS configuration for offline/air-gapped environments
# No external DNS forwarding - strictly local resolution

offline.local {
    log
    hosts {
        127.0.0.1 offline.local
        127.0.0.1 registry.offline.local
        127.0.0.1 pypi.offline.local
        127.0.0.1 artifacts.offline.local
        127.0.0.1 config.offline.local
    }
}

# Internal platform zone
platform.internal {
    hosts {
        127.0.0.1 platform.internal
        127.0.0.1 api.platform.internal
    }
}

# Health check endpoint
. {
    health 0.0.0.0:8888
}
