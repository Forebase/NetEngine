apiVersion: 1

datasources:
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger-query:16686
    isDefault: true
    editable: true
    jsonData:
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true
      tracesToLogs:
        enabled: true
        datasourceUid: loki

  - name: Zipkin
    type: zipkin
    access: proxy
    url: http://zipkin:9411
    isDefault: false
    editable: true
    profiles:
      - zipkin

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true
      tracesToMetrics:
        enabled: true
        datasourceUid: prometheus
      tracesToLogs:
        enabled: true
        datasourceUid: loki

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
