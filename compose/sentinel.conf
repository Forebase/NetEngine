# Redis Sentinel configuration for high availability
# Monitors Redis master and automatically promotes replica on failure

port 26379
bind 0.0.0.0
daemonize no
protected-mode no

# Monitor Redis master: name, IP, port, quorum (number of sentinels that must agree)
sentinel monitor redis-master redis 6379 1

# How long (in ms) must the master be unavailable for failover to trigger
sentinel down-after-milliseconds redis-master 5000

# Timeout for failover operation
sentinel failover-timeout redis-master 10000

# Number of replicas to reconfigure after failover
sentinel parallel-syncs redis-master 1

# Log output
loglevel notice
logfile ""

# Working directory
dir /data

# Notification scripts (optional)
# sentinel notification-script redis-master /path/to/notification.sh
# sentinel client-reconfig-script redis-master /path/to/reconfig.sh
