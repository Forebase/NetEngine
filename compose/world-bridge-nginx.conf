events {
    worker_connections 1024;
}

http {
    # World 1 backend proxy
    upstream world1_api {
        server api.world1.bridge:8080;
    }

    upstream world1_registry {
        server registry.world1.bridge:5000;
    }

    # World 2 backend proxy
    upstream world2_api {
        server api.world2.bridge:8080;
    }

    upstream world2_registry {
        server registry.world2.bridge:5000;
    }

    # World 1 API bridge
    server {
        listen 8100;
        server_name world1-api-bridge;

        location / {
            proxy_pass http://world1_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-World-Bridge: true;
        }
    }

    # World 2 API bridge
    server {
        listen 8101;
        server_name world2-api-bridge;

        location / {
            proxy_pass http://world2_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-World-Bridge: true;
        }
    }
}
