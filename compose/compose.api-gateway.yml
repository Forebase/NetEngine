version: "3.8"

# API Gateway for in-world services
# Routes, rate limits, authenticates, monitors all internal service traffic
# Available at: api-gateway.platform.internal (or api.platform.internal for legacy)

services:
  # Kong API Gateway
  kong-db:
    image: postgres:15
    container_name: netengine_kong_db
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev}
      POSTGRES_DB: kong
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 10

  kong-migrations:
    image: kong:3.3-alpine
    container_name: netengine_kong_migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev}
      KONG_PG_DATABASE: kong
    depends_on:
      kong-db:
        condition: service_healthy

  kong:
    image: kong:3.3-alpine
    container_name: netengine_kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev}
      KONG_PG_DATABASE: kong
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_LOG_LEVEL: info
    ports:
      - "8000:8000"   # Proxy HTTP
      - "8443:8443"   # Proxy HTTPS
      - "8001:8001"   # Admin API
      - "8002:8002"   # Admin GUI
    depends_on:
      - kong-migrations
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kong Admin UI (Konga)
  konga:
    image: pantsel/konga:latest
    container_name: netengine_konga
    environment:
      DB_ADAPTER: postgres
      DB_HOST: kong-db
      DB_USER: kong
      DB_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev}
      DB_DATABASE: konga
      NODE_ENV: production
    ports:
      - "1337:1337"
    depends_on:
      - kong
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1337/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Envoy Proxy alternative (for service mesh)
  envoy:
    image: envoyproxy/envoy:v1.26-latest
    container_name: netengine_envoy
    volumes:
      - ./compose/envoy-config.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8100:8000"
      - "8101:8001"  # Admin
    entrypoint: /usr/local/bin/envoy
    command:
      - -c
      - /etc/envoy/envoy.yaml
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8101/stats"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - envoy-proxy

  # API rate limiter & quota manager
  rate-limiter:
    image: redis:7-alpine
    container_name: netengine_rate_limiter
    ports:
      - "6381:6379"
    volumes:
      - rate_limiter_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kong_db_data:
  rate_limiter_data:
