# CoreDNS configuration for benchmarking
# High-throughput testing setup

. {
    # Logging for analysis
    log

    # Prometheus metrics for monitoring
    prometheus 0.0.0.0:9153

    # Aggressive caching for benchmarks
    cache 300

    # Health checks
    health 0.0.0.0:8888

    # Root forwarder with pooling
    forward . 8.8.8.8 {
        max_concurrent 10000
        prefer_udp
    }
}

# Benchmark zone with many records
bench.internal {
    file /root/zones/bench.internal.db {
        reload 10s
    }
}
