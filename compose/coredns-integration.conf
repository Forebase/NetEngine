# CoreDNS configuration for integration testing
# Provides a stub resolver for testing DNS functionality

. {
    # Log all queries
    log

    # Enable query metrics
    prometheus 0.0.0.0:9153

    # Root zone - forward everything upstream for testing
    forward . 8.8.8.8 8.8.4.4 {
        max_concurrent 1000
    }

    # Cache for performance
    cache 30

    # Enable health checks
    health 0.0.0.0:8888
}

# Platform zone stub for testing
platform.internal {
    # Return localhost for all platform.internal queries
    hosts {
        127.0.0.1 platform.internal
        127.0.0.1 api.platform.internal
        127.0.0.1 keycloak.platform.internal
        127.0.0.1 registry.platform.internal
        127.0.0.1 mail.platform.internal
    }
}
