version: 0.1
log:
  level: info
  fields:
    service: registry
    environment: offline
storage:
  cache:
    blobdescriptor: inmemory
  filesystem:
    rootdirectory: /var/lib/registry
  delete:
    enabled: true
http:
  addr: :5000
  headers:
    X-Content-Type-Options:
      - nosniff
    Access-Control-Allow-Origin:
      - "*"
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 5
