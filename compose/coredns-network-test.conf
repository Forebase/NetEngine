# CoreDNS configuration for network testing
# Tests DNS resolution, zone delegation, and network policies

. {
    # Log queries for debugging
    log

    # Prometheus metrics for monitoring
    prometheus 0.0.0.0:9153

    # Cache responses
    cache 30

    # Health checks
    health 0.0.0.0:8888

    # Root forwarder
    forward . 8.8.8.8 {
        max_concurrent 1000
    }
}

# World internal zone (simulates NetEngine world)
world.internal {
    file /root/zones/world.internal.db {
        reload 10s
    }
}

# Platform zone
platform.internal {
    hosts {
        127.0.0.1 platform.internal
        127.0.0.1 api.platform.internal
        127.0.0.1 registry.platform.internal
    }
}

# Test zone for network isolation testing
isolated.world {
    hosts {
        10.0.0.1 isolated.world
        10.0.0.2 app.isolated.world
        10.0.0.3 db.isolated.world
    }
}
