apiVersion: 1

datasources:
  - name: Audit Logs
    type: loki
    access: proxy
    url: http://audit-log-collector:3100
    isDefault: true
    editable: true
    jsonData:
      derivedFields:
        - name: username
          matcherRegex: 'username="([^"]*)"'
          url: '/explore?left={"datasource":"Audit Logs","queries":[{"expr":"{username="$${__value.raw}"}"}]'
        - name: action
          matcherRegex: 'action="([^"]*)"'
          url: '/explore?left={"datasource":"Audit Logs","queries":[{"expr":"{action="$${__value.raw}"}"}]'

  - name: PKI Audit
    type: loki
    access: proxy
    url: http://pki-audit-sink:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'Audit'
        orgId: 1
        folder: 'Audit'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
