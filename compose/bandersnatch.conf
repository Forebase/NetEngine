[blacklist]
# PyPI Bandersnatch configuration for offline environments
# Mirrors selected Python packages for air-gapped NetEngine deployments

[mirror]
# The directory where the mirror data is stored
directory = /data

# The PyPI server to mirror from
master = https://pypi.python.org

# Number of worker threads to use for parallel downloads
workers = 3

# Whether to hash index files
# Note that package index directory hashing is incompatible with pip, and so this should only be used in an environment
# where it is behind an application that can translate URIs to filesystem locations.
hash_index = false

# Whether to hash package indexes
# This is experimental and works with pip, and it is possible it works with other tools, but that should
# be verified.
hashes = true

# Whether to stop the entire mirror immediately after the first sync if an error occurs (default: true)
stop-on-error = false

# Whether to verify the SSL certificates when mirroring
verify_ssl = true

# The network socket timeout to use for all connections. This is a float, and defaults to 10
socket_timeout = 10

[blacklist]
# List of PyPI packages NOT to mirror
packages =
    fabric
    Pillow

[whitelist]
# List of PyPI packages TO mirror (if set, only these are mirrored)
packages =
    poetry
    click
    requests
    pydantic
    sqlalchemy
    psycopg2-binary
    loguru
    fastapi
    uvicorn
    pytest
