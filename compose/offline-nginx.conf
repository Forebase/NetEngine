events {
    worker_connections 1024;
}

http {
    # Artifact server
    server {
        listen 8080;
        server_name artifact-server;

        root /usr/share/nginx/html;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            autoindex on;
            types {
                text/plain .txt .sha256 .md5;
                application/gzip .gz;
                application/tar .tar;
                application/json .json;
            }
        }
    }

    # Config mirror
    server {
        listen 8081;
        server_name config-mirror;

        root /configs;

        location /specs/ {
            autoindex on;
            alias /configs/specs/;
        }

        location /schemas/ {
            autoindex on;
            alias /configs/schemas/;
        }

        location / {
            autoindex on;
        }
    }
}
