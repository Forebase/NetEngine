version: "3.8"

# Security scanning, vulnerability detection, compliance checks
# Includes image scanning, SAST, DAST, secret scanning
# Usage: docker compose -f docker-compose.yml -f compose/compose.security.yml up -d

services:
  # Trivy container image scanner
  trivy-scanner:
    image: aquasec/trivy:latest
    container_name: netengine_trivy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy_cache:/root/.cache/trivy
      - ./compose/trivy-reports:/reports
    command:
      - image
      - --severity
      - HIGH,CRITICAL
      - --format
      - json
      - --output
      - /reports/image-scan.json
      - netengine:latest
    profiles:
      - security-scan

  # OWASP Dependency Check for dependencies
  dependency-checker:
    image: owasp/dependency-check:latest
    container_name: netengine_dependency_check
    volumes:
      - .:/src:ro
      - ./compose/dependency-reports:/report
    command:
      - --project
      - NetEngine
      - --scan
      - /src
      - --format
      - JSON
      - --out
      - /report
    profiles:
      - security-scan

  # Snyk for vulnerability scanning (requires token)
  snyk-scanner:
    image: snyk/snyk:docker
    container_name: netengine_snyk
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    environment:
      SNYK_TOKEN: ${SNYK_TOKEN:-}
    working_dir: /workspace
    command:
      - snyk
      - test
      - --docker
      - --severity-threshold=high
    profiles:
      - snyk

  # SonarQube for code quality & security
  sonarqube:
    image: sonarqube:latest
    container_name: netengine_sonarqube
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLED: "true"
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - sonar-db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - sonarqube

  # SonarQube database
  sonar-db:
    image: postgres:15
    container_name: netengine_sonar_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      POSTGRES_DB: sonar
    ports:
      - "5437:5432"
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - sonarqube

  # Falco for runtime security monitoring
  falco:
    image: falcosecurity/falco:latest
    container_name: netengine_falco
    environment:
      FALCO_K8S_AUDIT_ENDPOINT: "http://localhost:8080/audit"
    volumes:
      - /var:/host/var:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - ./compose/falco-rules.yaml:/etc/falco/rules.d/custom.yaml:ro
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    profiles:
      - falco

  # OWASP ZAP for dynamic security testing (DAST)
  owasp-zap:
    image: owasp/zap2docker-stable:latest
    container_name: netengine_owasp_zap
    ports:
      - "8084:8080"
      - "8090:8090"
    volumes:
      - zap_reports:/zap/wrk
    command:
      - zap-x.sh
      - -config
      - api.disablekey=true
      - -config
      - api.addrs.addr.name=.*
      - -config
      - api.addrs.addr.regex=true
    profiles:
      - owasp-zap

  # Vault for secrets management testing
  vault:
    image: vault:latest
    container_name: netengine_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-myroot}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - vault

  # Secret scanning (gitleaks)
  gitleaks:
    image: zricethezav/gitleaks:latest
    container_name: netengine_gitleaks
    volumes:
      - .:/repo:ro
      - ./compose/gitleaks-reports:/reports
    command:
      - detect
      - --source
      - /repo
      - --report-path
      - /reports/gitleaks-report.json
      - --exit-code
      - "0"
    profiles:
      - secret-scan

volumes:
  trivy_cache:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
  zap_reports:
  vault_data:
