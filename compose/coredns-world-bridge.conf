# CoreDNS configuration for world bridging
# Enables DNS queries across multiple worlds

. {
    log
    prometheus 0.0.0.0:9153
    cache 60
    health 0.0.0.0:8888
    forward . 8.8.8.8
}

# Bridge zone
bridge.local {
    hosts {
        127.0.0.1 bridge.local
        127.0.0.1 dns-bridge.local
    }
}

# World 1 zone (forwarded from world 1 DNS)
world1.bridge {
    file /root/zones/world1.bridge.db {
        reload 10s
    }
}

# World 2 zone (forwarded from world 2 DNS)
world2.bridge {
    file /root/zones/world2.bridge.db {
        reload 10s
    }
}
